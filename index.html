<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zareena Muhammed | DevOps Engineer</title>

<style>

body {
    margin: 0;
    font-family: "Times New Roman", Times, serif;
    transition: 0.3s;
    background: #ffffff;
    color: #000;
}

/* DARK MODE */
.dark-mode {
    background: #121212;
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: #f4f4f4;
    position: sticky;
    top: 0;
}

.dark-mode .navbar {
    background: #1e1e1e;
}

.nav-links a {
    margin: 0 15px;
    text-decoration: none;
    color: inherit;
    font-size: 18px;
}

.toggle-btn {
    cursor: pointer;
    font-size: 20px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
}

.typewriter {
    font-weight: bold;
    font-size: 26px;
    border-right: 2px solid;
    width: fit-content;
    margin: auto;
    white-space: nowrap;
    overflow: hidden;
}

/* CONTACT FLOAT BUTTON */
.contact-btn {
    position: fixed;
    right: 20px;
    top: 50%;
    padding: 10px 18px;
    background: #2c3e50;
    color: white;
    border-radius: 25px;
    cursor: pointer;
}

/* FOOTER */
.footer {
    background: #eee;
    padding: 20px;
    text-align: center;
}

.dark-mode .footer {
    background: #1e1e1e;
}

.footer a {
    margin: 0 10px;
    font-size: 20px;
    text-decoration: none;
    color: inherit;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Skills</a>
        <a href="#">Portfolio</a>
        <a href="#">Contact</a>
    </div>

    <div class="toggle-btn" onclick="toggleMode()" id="modeIcon">🌙</div>
</div>

<!-- HERO -->
<section class="hero">
    <h1>Hello, I'm Zareena Muhammed</h1>
    <div class="typewriter" id="typeText"></div>

    <p>
        Multi-Cloud (AWS & Azure) • Kubernetes (EKS & AKS) • Terraform • CI/CD • Cloud Automation
    </p>

    <p>
        Building resilient, automated, and production-ready cloud platforms.
    </p>
</section>

<!-- CONTACT FLOAT -->
<div class="contact-btn">
    Contact
</div>

<!-- FOOTER -->
<div class="footer">

    🌐 English (US)

    <br><br>

    <a href="https://linkedin.com" target="_blank">🔗</a>
    <a href="https://instagram.com" target="_blank">📷</a>
    <a href="https://facebook.com" target="_blank">📘</a>
    <a href="https://pinterest.com" target="_blank">📌</a>
    <a href="https://twitter.com" target="_blank">❌</a>
    <a href="https://youtube.com" target="_blank">▶️</a>

</div>

<script>

/* TYPEWRITER */
let text = "I'm a Senior DevOps Engineer";
let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("typeText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 60);
    }
}
typeWriter();

/* DARK MODE */
function toggleMode() {
    document.body.classList.toggle("dark-mode");

    let icon = document.getElementById("modeIcon");
    icon.textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
}

</script>

</body>
</html>
